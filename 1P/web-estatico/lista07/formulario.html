<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário HTML</title>
</head>

<body style="font-size: 20px; font-family: arial;">

        <input type="radio" id="feminino" name="genero" value="f">
        <label for="feminino">Feminino</label><br>
        <label for="estado-civil">Estado Civil:</label>
        <select name="estado_civil" id="estado-civil" style="font-family: arial; font-size: 16px; text-align: center;">
            <option value="opcoes">Opções:</option>
            <option value="solteiro">Solteiro(a)</option>
            <option value="casado">Casado(a)</option>
            <option value="viuvo">Viúvo(a)</option>
            <option value="divorciado">Divorciado(a)</option>
            <option value="outro">Outro</option>
        </select><br>
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="usuario_email"><br>
        <label for="endereco">Endereço:</label>

        <label for="numero">Número:</label>
        <input type="number" id="numero" name="endereco_numero" min="1" step="1"><br>
        <label for="nascimento">Data de Nascimento:</label>
        <input type="date" id="nascimento" name="data_nascimento"

        <label for="telefone">Telefone:</label>
        <input type="tel" name="usuario_telefone" id="telefone"><br>

    </form>

</body>

</html>
